apiVersion: apps/v1
kind: Deployment
metadata:
  name: growth-core
  namespace: statex-apps
  labels:
    app: growth-core
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: growth-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: growth-core
    spec:
      # The decision_artefact immutability trigger is part of the contract, not an ops step.
      # Running migrations as an init container means a pod cannot serve writes against a
      # schema where the trigger is missing — which would look like it is protecting the
      # table while silently permitting edits.
      initContainers:
        - name: migrate
          image: localhost:5000/growth-core:latest
          imagePullPolicy: Always
          command: ["node", "scripts/migrate.js"]
          envFrom:
            - configMapRef:
                name: growth-core-config
            - secretRef:
                name: growth-core-secret
      containers:
        - name: app
          image: localhost:5000/growth-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3376
              name: http
          envFrom:
            - configMapRef:
                name: growth-core-config
            - secretRef:
                name: growth-core-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 3376
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3376
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
