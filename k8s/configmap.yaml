apiVersion: v1
kind: ConfigMap
metadata:
  name: growth-core-config
  namespace: statex-apps
  labels:
    app: growth-core
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "growth-core"
  # ClusterIP-only — no public ingress. See deploy.config.sh for why.
  DOMAIN: "growth-core.statex-apps.svc.cluster.local"
  PORT: "3376"
  LOGGING_SERVICE_URL: "http://logging-microservice.statex-apps.svc.cluster.local:3367"
  LOGGING_SERVICE_API_PATH: "/api/logs"
  AUTH_SERVICE_URL: "http://auth-microservice.statex-apps.svc.cluster.local:3370"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice.statex-apps.svc.cluster.local:3368"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  # The runtime credential, used by the app container. It owns nothing: decision_artefact's
  # immutability is a trigger, and any table *owner* can ALTER TABLE ... DISABLE TRIGGER, so a
  # service that owned its own tables could switch off its own audit guarantee. Ownership lives
  # with growth_core_owner, which only the migrate init container uses. See
  # services/core/migrations/003_runtime_grants.sql.
  DB_USER: "growth_core"
  DB_NAME: "growth_core"
