apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: growth-core-secret
  namespace: statex-apps
  labels:
    app: growth-core
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: growth-core-secret
    creationPolicy: Owner
  data:
    # Runtime credential — the app container. DML only, no ownership.
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/prod/growth-core
        property: DB_PASSWORD
    # Schema-owner credential — the migrate init container and nothing else.
    # Kept apart so the running application cannot disable its own immutability trigger.
    - secretKey: DB_OWNER_PASSWORD
      remoteRef:
        key: secret/prod/growth-core
        property: DB_OWNER_PASSWORD
    # C-005 §4 — verifies the gsid signature on incoming clicks. Lives at secret/prod/growth
    # rather than secret/prod/growth-core because it is shared with growth-web, which mints the
    # tokens this service checks: one secret, two sides of the same signature.
    - secretKey: GROWTH_GSID_HMAC_SECRET
      remoteRef:
        key: secret/prod/growth
        property: GROWTH_GSID_HMAC_SECRET
